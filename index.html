<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tempo Fitness</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      color: white;
      text-align: center;
      background-image: url('./arka-plan.jpg');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      background-color: #000;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.60);
      z-index: -1;
    }

    .hero {
      height: 100vh;
      display: flex;

      font-size: 60px;
      margin: 0;
    }

      margin: 12px 0 24px;
      color: #ddd;
    }

    .btn {
      display: inline-block;
      background: linear-gradient(135deg,#FFD700,#FFA500);
      color: black;
      padding: 12px 26px;
      border-radius: 10px;
      text-decoration: none;
      font-weight: bold;
    }

    .section {
      padding: 60px 20px;
      background: rgba(0,0,0,0.72);
    }

    .card {
      display: inline-block;
      margin: 10px;
      padding: 15px 25px;
      background: rgba(255,255,255,0.08);
      border-radius: 12px;
    }

    .whatsapp {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: linear-gradient(135deg,#FFD700,#FFA500);
      color: black;
      padding: 15px;
      border-radius: 50%;
      text-decoration: none;
      font-size: 20px;
      box-shadow: 0 0 15px rgba(255,215,0,0.7);
    }
  </style>
</head>
<body>

    <div class="card">PT (Özel Ders)</div>
    <div class="card">Fonksiyonel</div>
  </div>

  <div class="section">

    <div class="card">Profesyonel koçlar</div>
